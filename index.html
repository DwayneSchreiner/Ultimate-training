<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ultimate Training">
<meta name="theme-color" content="#0a0a0a">
<title>ULTIMATE TRAINING</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #B8952A; --gold-light: #D4AF37; --gold-dim: #7a6220;
    --black: #0a0a0a; --dark: #111111; --card: #161616; --card2: #1c1c1c;
    --border: #2a2a2a; --text: #e8e8e8; --muted: #666; --green: #27ae60;
    --red: #c0392b;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--black); color: var(--text);
    font-family: 'Barlow', sans-serif; min-height:100vh; overflow-x:hidden;
    padding-bottom: calc(24px + var(--safe-bottom));
  }

  /* ---- LOGIN SCREEN ---- */
  #loginScreen {
    position: fixed; inset: 0; background: var(--black);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 24px;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    padding: 48px 36px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-logo {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 32px;
  }
  .login-logo svg { width: 48px; height: 48px; }
  .login-logo-text { text-align: left; }
  .login-logo-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:3px; line-height:1; }
  .login-logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:0.65rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
  .login-label { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; display:block; }
  .login-input-wrap { position: relative; margin-bottom: 8px; }
  .login-input {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    padding: 14px 48px 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 2px;
  }
  .login-input:focus { border-color: var(--gold); }
  .login-input.error { border-color: var(--red); }
  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1.1rem; padding: 0; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .login-error {
    font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; letter-spacing:1px;
    color: var(--red); margin-bottom: 16px; min-height: 18px;
    text-transform: uppercase;
  }
  .login-btn {
    width: 100%;
    background: var(--gold);
    color: var(--black);
    border: none;
    border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .login-btn:hover, .login-btn:active { background: var(--gold-light); }

  /* ---- MAIN APP ---- */
  #appScreen { display: none; }

  header {
    background: var(--dark); border-bottom: 2px solid var(--gold);
    padding: 0 20px; padding-top: var(--safe-top);
    position: sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    height: calc(64px + var(--safe-top));
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:36px; height:36px; flex-shrink:0; }
  .logo-text { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:3px; line-height:1; }
  .logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; line-height:1; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .sync-status { display:flex; align-items:center; gap:5px; font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background 0.3s; }
  .sync-dot.online { background:var(--green); }
  .sync-dot.syncing { background:var(--gold); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .btn { font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; letter-spacing:1.5px; text-transform:uppercase; padding:7px 14px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; border-radius:2px; -webkit-tap-highlight-color:transparent; }
  .btn:hover,.btn:active { color:var(--text); border-color:var(--gold); }
  .btn-gold { background:var(--gold); color:var(--black); border-color:var(--gold); font-weight:700; }
  .btn-gold:hover,.btn-gold:active { background:var(--gold-light); color:var(--black); }
  .container { max-width:900px; margin:0 auto; padding:24px 16px; }
  .week-nav { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:22px; }
  .week-btn { font-family:'Barlow Condensed',sans-serif; font-size:0.73rem; letter-spacing:1px; padding:7px 11px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; border-radius:2px; -webkit-tap-highlight-color:transparent; }
  .week-btn.active { background:var(--gold); color:var(--black); border-color:var(--gold); font-weight:700; }
  .week-btn.deload { color:var(--gold-dim); }
  .week-btn.deload.active { background:var(--gold-dim); border-color:var(--gold-dim); color:var(--text); }
  .progress-bar-wrap { margin-bottom:22px; }
  .progress-label { display:flex; justify-content:space-between; font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:2px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; }
  .progress-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold-light)); border-radius:2px; transition:width 0.5s ease; }
  .week-header { margin-bottom:18px; display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap; }
  .week-title { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; line-height:1; letter-spacing:2px; }
  .week-title span { color:var(--gold); }
  .week-quote { font-style:italic; font-size:0.88rem; color:var(--muted); padding-bottom:4px; border-left:2px solid var(--gold); padding-left:12px; }
  .deload-badge { display:inline-block; background:var(--gold-dim); color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; letter-spacing:3px; padding:3px 8px; border-radius:2px; text-transform:uppercase; margin-left:10px; vertical-align:middle; }
  .day-tabs { display:flex; margin-bottom:18px; border-bottom:1px solid var(--border); overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .day-tabs::-webkit-scrollbar { display:none; }
  .day-tab { font-family:'Barlow Condensed',sans-serif; font-size:0.83rem; letter-spacing:1.5px; text-transform:uppercase; padding:12px 20px; border:none; background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; position:relative; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
  .day-tab::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--gold); transform:scaleX(0); transition:transform 0.2s; }
  .day-tab.active { color:var(--gold); }
  .day-tab.active::after { transform:scaleX(1); }
  .workout-card { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; animation:fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .main-lift { background:linear-gradient(135deg,#1a1500 0%,#161616 60%); border-bottom:1px solid var(--gold-dim); padding:20px; }
  .section-label { font-family:'Barlow Condensed',sans-serif; font-size:0.63rem; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
  .main-lift-name { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px; margin-bottom:14px; }
  .sets-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .set-item { background:var(--card2); border:1px solid var(--border); border-radius:4px; padding:12px; }
  .set-item.set-peak { border-color:var(--gold-dim); }
  .set-percent { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:2px; color:var(--gold); margin-bottom:4px; }
  .set-reps { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; color:var(--muted); margin-bottom:8px; }
  .weight-input-wrap { position:relative; }
  .weight-input { width:100%; background:var(--black); border:1px solid var(--border); border-radius:3px; color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:1px; padding:8px 34px 8px 10px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; }
  .weight-input:focus { border-color:var(--gold); }
  .weight-input.has-value { border-color:var(--gold-dim); color:var(--gold-light); }
  .weight-unit { position:absolute; right:8px; top:50%; transform:translateY(-50%); font-family:'Barlow Condensed',sans-serif; font-size:0.62rem; color:var(--muted); pointer-events:none; }
  .accessory-section { padding:18px 20px; }
  .accessory-label { font-family:'Barlow Condensed',sans-serif; font-size:0.63rem; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .exercise-row { display:flex; align-items:center; padding:9px 0; border-bottom:1px solid #1e1e1e; gap:10px; }
  .exercise-row:last-child { border-bottom:none; }
  .ex-num { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; color:var(--gold-dim); width:16px; flex-shrink:0; }
  .ex-name { font-family:'Barlow',sans-serif; font-size:0.86rem; font-weight:500; flex:1; }
  .ex-sets { font-family:'Barlow Condensed',sans-serif; font-size:0.73rem; color:var(--muted); letter-spacing:1px; width:54px; text-align:center; flex-shrink:0; }
  .ex-weight-wrap { position:relative; width:96px; flex-shrink:0; }
  .ex-weight { width:100%; background:var(--black); border:1px solid var(--border); border-radius:3px; color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:1px; padding:6px 26px 6px 8px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; }
  .ex-weight:focus { border-color:var(--gold); }
  .ex-weight.has-value { color:var(--gold-light); }
  .ex-unit { position:absolute; right:6px; top:50%; transform:translateY(-50%); font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; color:var(--muted); pointer-events:none; }
  .notes-wrap { padding:14px 20px 20px; border-top:1px solid #1a1a1a; }
  .notes-label { font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:7px; }
  .notes-input { width:100%; background:var(--black); border:1px solid var(--border); border-radius:3px; color:var(--text); font-family:'Barlow',sans-serif; font-size:0.84rem; padding:10px 12px; resize:vertical; min-height:60px; outline:none; transition:border-color 0.2s; }
  .notes-input:focus { border-color:var(--gold-dim); }
  .notes-input::placeholder { color:#333; }
  .oneRM-card { background:var(--card); border:1px solid var(--gold-dim); border-radius:6px; padding:36px 24px; max-width:480px; margin:0 auto; text-align:center; }
  .oneRM-title { font-family:'Bebas Neue',sans-serif; font-size:2.6rem; letter-spacing:4px; color:var(--gold); margin-bottom:6px; }
  .oneRM-sub { color:var(--muted); font-size:0.86rem; margin-bottom:32px; }
  .oneRM-lifts { display:flex; flex-direction:column; gap:16px; }
  .oneRM-row { display:flex; align-items:center; gap:14px; }
  .oneRM-lift-name { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; width:110px; text-align:left; }
  .oneRM-input-wrap { flex:1; position:relative; }
  .oneRM-input { width:100%; background:var(--black); border:1px solid var(--border); border-radius:3px; color:var(--gold-light); font-family:'Bebas Neue',sans-serif; font-size:1.7rem; padding:10px 44px 10px 14px; outline:none; text-align:right; transition:border-color 0.2s; -webkit-appearance:none; }
  .oneRM-input:focus { border-color:var(--gold); }
  .oneRM-unit { position:absolute; right:11px; top:50%; transform:translateY(-50%); font-family:'Barlow Condensed',sans-serif; font-size:0.78rem; color:var(--muted); }
  .toast { position:fixed; bottom:calc(20px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(16px); background:var(--card2); border:1px solid var(--gold-dim); color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; letter-spacing:2px; padding:9px 18px; border-radius:4px; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap; text-transform:uppercase; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.green { border-color:var(--green); color:var(--green); }
  @media (max-width:480px) {
    .sets-grid { grid-template-columns:1fr; gap:8px; }
    .week-title { font-size:2.2rem; }
    .login-card { padding: 36px 24px; }
  }
</style>
</head>

async function hashPw(pw) {
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ---- STATE ----
let cW=1,cD='A',localData={},syncTimer=null;

function loadLocal(){try{const r=localStorage.getItem('ut_v2');if(r)localData=JSON.parse(r);}catch(e){}}
function saveLocal(){try{localStorage.setItem('ut_v2',JSON.stringify(localData));}catch(e){}}
function setSync(s){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncText');
  dot.className='sync-dot '+s;
  txt.textContent=s==='online'?'Gesync':s==='syncing'?'Syncing...':'Offline';
}
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.className='toast',2500);
}
async function syncUp(){
  setSync('syncing');
  try{await setDoc(doc(db,'training','user_data'),{data:localData,updatedAt:new Date().toISOString()});setSync('online');toast('✓ Gesynchroniseerd','green');}
  catch(e){setSync('offline');}
}
async function syncDown(){
  setSync('syncing');
  try{const snap=await getDoc(doc(db,'training','user_data'));if(snap.exists()){localData={...localData,...(snap.data().data||{})};saveLocal();}setSync('online');}
  catch(e){setSync('offline');}
  buildNav();renderWeek();
}
function debouncedSync(){clearTimeout(syncTimer);syncTimer=setTimeout(syncUp,1500);}
function get(k){return localData[k]||'';}
function set(k,v){localData[k]=v;saveLocal();debouncedSync();}

function buildNav(){
  const nav=document.getElementById('weekNav');nav.innerHTML='';
  for(let w=1;w<=12;w++){
    const b=document.createElement('button');
    b.className=`week-btn${P[w].dl?' deload':''}${w===cW?' active':''}`;
    b.textContent=`W${w}${P[w].dl?' ·D':''}`;
    b.onclick=()=>showWeek(w);nav.appendChild(b);
  }
  const b=document.createElement('button');
  b.className='week-btn'+(cW===13?' active':'');
  b.style.borderColor='#B8952A55';b.textContent='🏆 1RM';
  b.onclick=()=>showWeek(13);nav.appendChild(b);
}

window.showWeek=function(w){
  cW=w;buildNav();
  if(w===13){
    document.getElementById('weekContent').style.display='none';
    document.getElementById('oneRMPage').style.display='block';
    document.getElementById('progressText').textContent='Finale';
    document.getElementById('progressFill').style.width='100%';
    ['squat','bench','deadlift'].forEach(l=>{const el=document.getElementById(l+'1RM');if(el)el.value=get('1rm_'+l);});return;
  }
  document.getElementById('weekContent').style.display='block';
  document.getElementById('oneRMPage').style.display='none';
  document.getElementById('progressText').textContent=`Week ${w} / 12`;
  document.getElementById('progressFill').style.width=`${(w/12)*100}%`;
  renderWeek();
};

function renderWeek(){
  const wk=P[cW];if(!wk)return;
  const badge=wk.dl?'<span class="deload-badge">Deload</span>':'';
  document.getElementById('weekContent').innerHTML=`
    <div class="week-header">
      <div class="week-title"><span>WEEK</span> ${cW}${badge}</div>
      <div class="week-quote">${wk.q}</div>
    </div>
    <div class="day-tabs">
      <button class="day-tab${cD==='A'?' active':''}" onclick="switchDay('A')">Day A — Squat</button>
      <button class="day-tab${cD==='B'?' active':''}" onclick="switchDay('B')">Day B — Bench</button>
      <button class="day-tab${cD==='C'?' active':''}" onclick="switchDay('C')">Day C — Deadlift</button>
    </div>
    <div id="dayContent"></div>`;
  renderDay();
}

window.switchDay=function(d){cD=d;renderWeek();};

function renderDay(){
  const day=P[cW][cD],w=cW,d=cD;
  const sets=day.m.s.map(([pct,reps],i)=>{
    const k=`w${w}_${d}_m_${i}`,sv=get(k);
    return `<div class="set-item${i===2?' set-peak':''}">
      <div class="set-percent">${pct}</div><div class="set-reps">${reps}</div>
      <div class="weight-input-wrap">
        <input type="number" class="weight-input${sv?' has-value':''}" placeholder="${day.m.w[i]}" value="${sv}" oninput="inp(this,'${k}')" step="2.5" inputmode="decimal">
        <span class="weight-unit">KG</span>
      </div></div>`;
  }).join('');
  const acc=day.a.map(([name,s],i)=>{
    const k=`w${w}_${d}_a_${i}`,sv=get(k);
    return `<div class="exercise-row">
      <span class="ex-num">${i+1}</span><span class="ex-name">${name}</span>
      <span class="ex-sets">${s}</span>
      <div class="ex-weight-wrap">
        <input type="number" class="ex-weight${sv?' has-value':''}" placeholder="—" value="${sv}" oninput="inp(this,'${k}')" step="2.5" inputmode="decimal">
        <span class="ex-unit">KG</span>
      </div></div>`;
  }).join('');
  const nk=`w${w}_${d}_n`,ns=get(nk);
  document.getElementById('dayContent').innerHTML=`
    <div class="workout-card">
      <div class="main-lift">
        <div class="section-label">▶ HOOFDLIFT</div>
        <div class="main-lift-name">${day.m.n}</div>
        <div class="sets-grid">${sets}</div>
      </div>
      <div class="accessory-section">
        <div class="accessory-label">▶ ACCESSOIRE OEFENINGEN</div>
        ${acc}
      </div>
      <div class="notes-wrap">
        <div class="notes-label">Notities</div>
        <textarea class="notes-input" placeholder="Hoe voelde de training? PR's? Opmerkingen..." oninput="inp(this,'${nk}')">${ns}</textarea>
      </div>
    </div>`;
}

window.inp=function(el,k){
  set(k,el.value);
  if(el.classList.contains('weight-input')||el.classList.contains('ex-weight'))
    el.classList.toggle('has-value',el.value.length>0);
};
window.save1RM=function(lift,v){set('1rm_'+lift,v);};

// Init (only if already logged in)
if(sessionStorage.getItem('ut_auth')==='1'){
  loadLocal();syncDown();
}
</script>
