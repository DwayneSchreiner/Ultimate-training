<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ultimate Training">
<meta name="theme-color" content="#F5F0E8">
<title>ULTIMATE TRAINING</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #B8860B;
    --gold-light: #D4A820;
    --gold-dim: #8B6508;
    --gold-bg: #FBF5E0;
    --bg: #F5F0E8;
    --surface: #FFFFFF;
    --surface2: #F0EBE0;
    --border: #DDD5C0;
    --border-light: #EDE7D8;
    --text: #1A1612;
    --text2: #3D3426;
    --muted: #8A7D68;
    --green: #2E7D32;
    --red: #C62828;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: calc(24px + var(--safe-bottom));
  }

  /* ---- LOGIN ---- */
  #loginScreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 24px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 4px solid var(--gold);
    border-radius: 12px;
    padding: 48px 36px;
    width: 100%; max-width: 380px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }
  .login-logo { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:32px; }
  .login-logo svg { width:48px; height:48px; }
  .login-logo-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:3px; line-height:1; color:var(--text); text-align:left; }
  .login-logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; text-align:left; }
  .login-label { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; display:block; text-align:left; }
  .login-input-wrap { position:relative; margin-bottom:8px; }
  .login-input {
    width:100%; background:var(--bg); border:1.5px solid var(--border);
    border-radius:6px; color:var(--text); font-family:'Barlow',sans-serif;
    font-size:1rem; padding:14px 48px 14px 16px; outline:none;
    transition:border-color 0.2s; letter-spacing:2px;
  }
  .login-input:focus { border-color:var(--gold); }
  .login-input.error { border-color:var(--red); }
  .toggle-pw { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.1rem; padding:0; -webkit-tap-highlight-color:transparent; }
  .login-error { font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; letter-spacing:1px; color:var(--red); margin-bottom:16px; min-height:18px; text-transform:uppercase; }
  .login-btn { width:100%; background:var(--gold); color:#fff; border:none; border-radius:6px; font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:3px; padding:14px; cursor:pointer; transition:background 0.2s; -webkit-tap-highlight-color:transparent; }
  .login-btn:hover,.login-btn:active { background:var(--gold-light); }

  /* ---- HEADER ---- */
  #appScreen { display:none; }
  header {
    background: var(--surface);
    border-bottom: 3px solid var(--gold);
    padding: 0 20px; padding-top: var(--safe-top);
    position: sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    height: calc(64px + var(--safe-top));
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:36px; height:36px; flex-shrink:0; }
  .logo-text { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:3px; line-height:1; color:var(--text); }
  .logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; line-height:1; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .sync-status { display:flex; align-items:center; gap:5px; font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background 0.3s; }
  .sync-dot.online { background:var(--green); }
  .sync-dot.syncing { background:var(--gold); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn { font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; letter-spacing:1.5px; text-transform:uppercase; padding:7px 14px; border:1.5px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; border-radius:4px; -webkit-tap-highlight-color:transparent; }
  .btn:hover,.btn:active { color:var(--text); border-color:var(--gold); }
  .btn-gold { background:var(--gold); color:#fff; border-color:var(--gold); font-weight:700; }
  .btn-gold:hover,.btn-gold:active { background:var(--gold-light); border-color:var(--gold-light); }

  /* ---- LAYOUT ---- */
  .container { max-width:900px; margin:0 auto; padding:24px 16px; }

  .week-nav { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:22px; }
  .week-btn { font-family:'Barlow Condensed',sans-serif; font-size:0.73rem; letter-spacing:1px; padding:7px 12px; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; transition:all 0.2s; border-radius:4px; -webkit-tap-highlight-color:transparent; }
  .week-btn:hover { border-color:var(--gold-dim); color:var(--text); }
  .week-btn.active { background:var(--gold); color:#fff; border-color:var(--gold); font-weight:700; }
  .week-btn.deload { color:var(--gold-dim); background:var(--gold-bg); }
  .week-btn.deload.active { background:var(--gold-dim); border-color:var(--gold-dim); color:#fff; }

  .progress-bar-wrap { margin-bottom:24px; }
  .progress-label { display:flex; justify-content:space-between; font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:2px; color:var(--muted); margin-bottom:7px; text-transform:uppercase; }
  .progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold-light)); border-radius:2px; transition:width 0.5s ease; }

  .week-header { margin-bottom:20px; display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap; }
  .week-title { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; line-height:1; letter-spacing:2px; color:var(--text); }
  .week-title span { color:var(--gold); }
  .week-quote { font-style:italic; font-size:0.9rem; color:var(--muted); padding-bottom:4px; border-left:3px solid var(--gold); padding-left:12px; }
  .deload-badge { display:inline-block; background:var(--gold-bg); color:var(--gold-dim); border:1px solid var(--gold-dim); font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; letter-spacing:3px; padding:3px 8px; border-radius:3px; text-transform:uppercase; margin-left:10px; vertical-align:middle; }

  /* ---- DAY TABS ---- */
  .day-tabs { display:flex; margin-bottom:20px; border-bottom:2px solid var(--border); overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .day-tabs::-webkit-scrollbar { display:none; }
  .day-tab { font-family:'Barlow Condensed',sans-serif; font-size:0.85rem; letter-spacing:1.5px; text-transform:uppercase; padding:12px 22px; border:none; background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; position:relative; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
  .day-tab::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:var(--gold); transform:scaleX(0); transition:transform 0.2s; }
  .day-tab.active { color:var(--gold); font-weight:600; }
  .day-tab.active::after { transform:scaleX(1); }

  /* ---- WORKOUT CARD ---- */
  .workout-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; animation:fadeIn 0.25s ease; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .main-lift { background:linear-gradient(135deg, var(--gold-bg) 0%, var(--surface) 70%); border-bottom:2px solid var(--border); padding:22px; }
  .section-label { font-family:'Barlow Condensed',sans-serif; font-size:0.63rem; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
  .main-lift-name { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:2px; margin-bottom:16px; color:var(--text); }

  .sets-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .set-item { background:var(--surface2); border:1.5px solid var(--border-light); border-radius:8px; padding:12px 10px; }
  .set-item.set-peak { border-color:var(--gold); background:var(--gold-bg); }
  .set-percent { font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; letter-spacing:2px; color:var(--gold); margin-bottom:4px; font-weight:600; }
  .set-reps { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:var(--muted); margin-bottom:10px; }

  /* ---- INPUTS ---- */
  .weight-input-wrap { position:relative; }
  .weight-input {
    width:100%; background:var(--surface); border:1.5px solid var(--border);
    border-radius:6px; color:var(--text); font-family:'Bebas Neue',sans-serif;
    font-size:1.3rem; letter-spacing:0px; padding:9px 30px 9px 8px;
    outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  .weight-input::placeholder { color:#999; font-size:1.2rem; }
  .weight-input:focus { border-color:var(--gold); background:var(--gold-bg); }
  .weight-input.has-value { border-color:var(--gold); color:var(--gold-dim); background:var(--gold-bg); }
  .weight-unit { position:absolute; right:8px; top:50%; transform:translateY(-50%); font-family:'Barlow Condensed',sans-serif; font-size:0.62rem; color:var(--muted); pointer-events:none; }

  .accessory-section { padding:20px; }
  .accessory-label { font-family:'Barlow Condensed',sans-serif; font-size:0.63rem; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .exercise-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid var(--border-light); gap:10px; }
  .exercise-row:last-child { border-bottom:none; }
  .ex-num { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; color:var(--gold); width:18px; flex-shrink:0; font-weight:600; }
  .ex-name { font-family:'Barlow',sans-serif; font-size:0.9rem; font-weight:500; flex:1; color:var(--text2); }
  .ex-sets { font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; color:var(--muted); letter-spacing:1px; width:56px; text-align:center; flex-shrink:0; }
  .ex-weight-wrap { position:relative; width:100px; flex-shrink:0; }
  .ex-weight { width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:5px; color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:1px; padding:7px 26px 7px 9px; outline:none; transition:all 0.2s; -webkit-appearance:none; }
  .ex-weight:focus { border-color:var(--gold); background:var(--gold-bg); }
  .ex-weight.has-value { border-color:var(--gold-dim); color:var(--gold-dim); background:var(--gold-bg); }
  .ex-unit { position:absolute; right:7px; top:50%; transform:translateY(-50%); font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; color:var(--muted); pointer-events:none; }

  .notes-wrap { padding:16px 20px 22px; border-top:1px solid var(--border-light); background:var(--surface2); }
  .notes-label { font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
  .notes-input { width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:6px; color:var(--text); font-family:'Barlow',sans-serif; font-size:0.85rem; padding:10px 12px; resize:vertical; min-height:64px; outline:none; transition:border-color 0.2s; }
  .notes-input:focus { border-color:var(--gold); }
  .notes-input::placeholder { color:var(--border); }

  /* ---- 1RM ---- */
  .oneRM-card { background:var(--surface); border:1px solid var(--border); border-top:4px solid var(--gold); border-radius:10px; padding:40px 28px; max-width:480px; margin:0 auto; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.07); }
  .oneRM-title { font-family:'Bebas Neue',sans-serif; font-size:2.6rem; letter-spacing:4px; color:var(--gold); margin-bottom:6px; }
  .oneRM-sub { color:var(--muted); font-size:0.86rem; margin-bottom:32px; }
  .oneRM-lifts { display:flex; flex-direction:column; gap:16px; }
  .oneRM-row { display:flex; align-items:center; gap:14px; }
  .oneRM-lift-name { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; width:110px; text-align:left; color:var(--text); }
  .oneRM-input-wrap { flex:1; position:relative; }
  .oneRM-input { width:100%; background:var(--gold-bg); border:1.5px solid var(--border); border-radius:6px; color:var(--gold-dim); font-family:'Bebas Neue',sans-serif; font-size:1.8rem; padding:10px 44px 10px 16px; outline:none; text-align:right; transition:border-color 0.2s; -webkit-appearance:none; }
  .oneRM-input:focus { border-color:var(--gold); }
  .oneRM-unit { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-family:'Barlow Condensed',sans-serif; font-size:0.78rem; color:var(--muted); }

  /* ---- TOAST ---- */
  .toast { position:fixed; bottom:calc(20px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(16px); background:var(--text); color:var(--surface); font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; letter-spacing:2px; padding:10px 20px; border-radius:6px; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap; text-transform:uppercase; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.green { background:var(--green); }

  @media (max-width:480px) {
  .sets-grid { grid-template-columns:1fr; gap:8px; }
  .set-item { display:flex; align-items:center; gap:12px; padding:10px 14px; }
  .set-percent { margin-bottom:0; width:36px; flex-shrink:0; }
  .set-reps { margin-bottom:0; width:28px; flex-shrink:0; }
  .weight-input-wrap { flex:1; }
    .week-title { font-size:2.2rem; }
    .main-lift-name { font-size:1.8rem; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="48" stroke="#B8860B" stroke-width="4"/>
        <polygon points="50,15 75,35 75,65 50,85 25,65 25,35" stroke="#B8860B" stroke-width="3" fill="none"/>
        <polygon points="50,25 68,40 68,60 50,75 32,60 32,40" fill="#B8860B" opacity="0.15"/>
        <rect x="43" y="40" width="14" height="3" fill="#B8860B"/>
        <rect x="43" y="48" width="14" height="3" fill="#B8860B"/>
        <rect x="43" y="56" width="14" height="3" fill="#B8860B"/>
      </svg>
      <div>
        <div class="login-logo-title">ULTIMATE TRAINING</div>
        <div class="login-logo-sub">Premium Edition</div>
      </div>
    </div>
    <label class="login-label">Wachtwoord</label>
    <div class="login-input-wrap">
      <input type="password" class="login-input" id="pwInput" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1">👁</button>
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" onclick="doLogin()">INLOGGEN</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="48" stroke="#B8860B" stroke-width="4"/>
        <polygon points="50,15 75,35 75,65 50,85 25,65 25,35" stroke="#B8860B" stroke-width="3" fill="none"/>
        <polygon points="50,25 68,40 68,60 50,75 32,60 32,40" fill="#B8860B" opacity="0.15"/>
        <rect x="43" y="40" width="14" height="3" fill="#B8860B"/>
        <rect x="43" y="48" width="14" height="3" fill="#B8860B"/>
        <rect x="43" y="56" width="14" height="3" fill="#B8860B"/>
      </svg>
      <div>
        <div class="logo-text">ULTIMATE TRAINING</div>
        <div class="logo-sub">Premium Edition</div>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">Laden...</span>
      </div>
      <button class="btn btn-gold" onclick="showWeek(13)">1RM</button>
    </div>
  </header>

  <div class="container">
    <div class="week-nav" id="weekNav"></div>
    <div class="progress-bar-wrap">
      <div class="progress-label"><span>Voortgang</span><span id="progressText">Week 1 / 12</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:8.3%"></div></div>
    </div>
    <div id="weekContent"></div>
    <div id="oneRMPage" style="display:none">
      <div class="oneRM-card">
        <div class="oneRM-title">FINALE 1RM TEST</div>
        <div class="oneRM-sub">Vul je maximale gewichten in na het voltooien van het programma</div>
        <div class="oneRM-lifts">
          <div class="oneRM-row"><div class="oneRM-lift-name">SQUAT</div><div class="oneRM-input-wrap"><input type="number" class="oneRM-input" id="squat1RM" placeholder="0" oninput="save1RM('squat',this.value)" step="2.5" inputmode="decimal"><span class="oneRM-unit">KG</span></div></div>
          <div class="oneRM-row"><div class="oneRM-lift-name">BENCH</div><div class="oneRM-input-wrap"><input type="number" class="oneRM-input" id="bench1RM" placeholder="0" oninput="save1RM('bench',this.value)" step="2.5" inputmode="decimal"><span class="oneRM-unit">KG</span></div></div>
          <div class="oneRM-row"><div class="oneRM-lift-name">DEADLIFT</div><div class="oneRM-input-wrap"><input type="number" class="oneRM-input" id="deadlift1RM" placeholder="0" oninput="save1RM('deadlift',this.value)" step="2.5" inputmode="decimal"><span class="oneRM-unit">KG</span></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, enableIndexedDbPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGuu-KRpAU3eClZGLGxMHi4J9yU3NpyyA",
  authDomain: "ultimate-training-e9bd3.firebaseapp.com",
  databaseURL: "https://ultimate-training-e9bd3-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ultimate-training-e9bd3",
  storageBucket: "ultimate-training-e9bd3.firebasestorage.app",
  messagingSenderId: "968143413971",
  appId: "1:968143413971:web:876e3b7e6e7fd6147aaa26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
try { enableIndexedDbPersistence(db); } catch(e) {}

// ---- PASSWORD ----
window.doLogin = async function() {
  const pw = document.getElementById('pwInput').value;
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  const enc2 = new TextEncoder().encode('DwayneUltimate2904!');
  const buf2 = await crypto.subtle.digest('SHA-256', enc2);
  const correct = Array.from(new Uint8Array(buf2)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hash === correct) {
    sessionStorage.setItem('ut_auth','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    loadLocal(); syncDown();
  } else {
    const inp=document.getElementById('pwInput'), err=document.getElementById('loginError');
    inp.classList.add('error'); err.textContent='Onjuist wachtwoord';
    setTimeout(()=>{inp.classList.remove('error');err.textContent='';},2000);
  }
};
window.togglePw = function() {
  const i=document.getElementById('pwInput');
  i.type=i.type==='password'?'text':'password';
};
if (sessionStorage.getItem('ut_auth')==='1') {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
}

// ---- STATE ----
let cW=1,cD='A',localData={},syncTimer=null;
function loadLocal(){try{const r=localStorage.getItem('ut_v2');if(r)localData=JSON.parse(r);}catch(e){}}
function saveLocal(){try{localStorage.setItem('ut_v2',JSON.stringify(localData));}catch(e){}}
function setSync(s){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncText');
  dot.className='sync-dot '+s;
  txt.textContent=s==='online'?'Gesync':s==='syncing'?'Syncing...':'Offline';
}
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.className='toast',2500);
}
async function syncUp(){
  setSync('syncing');
  try{await setDoc(doc(db,'training','user_data'),{data:localData,updatedAt:new Date().toISOString()});setSync('online');toast('✓ Gesynchroniseerd','green');}
  catch(e){setSync('offline');}
}
async function syncDown(){
  setSync('syncing');
  try{const snap=await getDoc(doc(db,'training','user_data'));if(snap.exists()){localData={...localData,...(snap.data().data||{})};saveLocal();}setSync('online');}
  catch(e){setSync('offline');}
  buildNav();renderWeek();
}
function debouncedSync(){clearTimeout(syncTimer);syncTimer=setTimeout(syncUp,1500);}
function get(k){return localData[k]||'';}
function set(k,v){localData[k]=v;saveLocal();debouncedSync();}

function buildNav(){
  const nav=document.getElementById('weekNav');nav.innerHTML='';
  for(let w=1;w<=12;w++){
    const b=document.createElement('button');
    b.className=`week-btn${P[w].dl?' deload':''}${w===cW?' active':''}`;
    b.textContent=`W${w}${P[w].dl?' ·D':''}`;
    b.onclick=()=>showWeek(w);nav.appendChild(b);
  }
  const b=document.createElement('button');
  b.className='week-btn'+(cW===13?' active':'');
  b.style.borderColor='#B8860B';b.textContent='🏆 1RM';
  b.onclick=()=>showWeek(13);nav.appendChild(b);
}

window.showWeek=function(w){
  cW=w;buildNav();
  if(w===13){
    document.getElementById('weekContent').style.display='none';
    document.getElementById('oneRMPage').style.display='block';
    document.getElementById('progressText').textContent='Finale';
    document.getElementById('progressFill').style.width='100%';
    ['squat','bench','deadlift'].forEach(l=>{const el=document.getElementById(l+'1RM');if(el)el.value=get('1rm_'+l);});return;
  }
  document.getElementById('weekContent').style.display='block';
  document.getElementById('oneRMPage').style.display='none';
  document.getElementById('progressText').textContent=`Week ${w} / 12`;
  document.getElementById('progressFill').style.width=`${(w/12)*100}%`;
  renderWeek();
};

function renderWeek(){
  const wk=P[cW];if(!wk)return;
  const badge=wk.dl?'<span class="deload-badge">Deload</span>':'';
  document.getElementById('weekContent').innerHTML=`
    <div class="week-header">
      <div class="week-title"><span>WEEK</span> ${cW}${badge}</div>
      <div class="week-quote">${wk.q}</div>
    </div>
    <div class="day-tabs">
      <button class="day-tab${cD==='A'?' active':''}" onclick="switchDay('A')">A · Squat</button>
      <button class="day-tab${cD==='B'?' active':''}" onclick="switchDay('B')">B · Bench</button>
      <button class="day-tab${cD==='C'?' active':''}" onclick="switchDay('C')">C · Deadlift</button>
    </div>
    <div id="dayContent"></div>`;
  renderDay();
}
window.switchDay=function(d){cD=d;renderWeek();};

function renderDay(){
  const day=P[cW][cD],w=cW,d=cD;
  const sets=day.m.s.map(([pct,reps],i)=>{
    const k=`w${w}_${d}_m_${i}`,sv=get(k);
    return `<div class="set-item${i===2?' set-peak':''}">
      <div class="set-percent">${pct}</div><div class="set-reps">${reps}</div>
      <div class="weight-input-wrap">
        <input type="number" class="weight-input${sv?' has-value':''}" placeholder="${day.m.w[i]}" value="${sv}" oninput="inp(this,'${k}')" step="2.5" inputmode="decimal">
        <span class="weight-unit">KG</span>
      </div></div>`;
  }).join('');
  const acc=day.a.map(([name,s],i)=>{
    const k=`w${w}_${d}_a_${i}`,sv=get(k);
    return `<div class="exercise-row">
      <span class="ex-num">${i+1}</span><span class="ex-name">${name}</span>
      <span class="ex-sets">${s}</span>
      <div class="ex-weight-wrap">
        <input type="number" class="ex-weight${sv?' has-value':''}" placeholder="—" value="${sv}" oninput="inp(this,'${k}')" step="2.5" inputmode="decimal">
        <span class="ex-unit">KG</span>
      </div></div>`;
  }).join('');
  const nk=`w${w}_${d}_n`,ns=get(nk);
  document.getElementById('dayContent').innerHTML=`
    <div class="workout-card">
      <div class="main-lift">
        <div class="section-label">▶ HOOFDLIFT</div>
        <div class="main-lift-name">${day.m.n}</div>
        <div class="sets-grid">${sets}</div>
      </div>
      <div class="accessory-section">
        <div class="accessory-label">▶ ACCESSOIRE OEFENINGEN</div>
        ${acc}
      </div>
      <div class="notes-wrap">
        <div class="notes-label">Notities</div>
        <textarea class="notes-input" placeholder="Hoe voelde de training? PR's? Opmerkingen..." oninput="inp(this,'${nk}')">${ns}</textarea>
      </div>
    </div>`;
}
window.inp=function(el,k){
  set(k,el.value);
  if(el.classList.contains('weight-input')||el.classList.contains('ex-weight'))
    el.classList.toggle('has-value',el.value.length>0);
};
window.save1RM=function(lift,v){set('1rm_'+lift,v);};

function scheduleNotification() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = new Date().toDateString();
  const now = new Date();
  const target = new Date();
  target.setHours(9, 0, 0, 0);
  if (now >= target) target.setDate(target.getDate() + 1);
  const delay = target - now;
  const dayIndex = Math.floor(Date.now() / 86400000) % QUOTES.length;
  setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification('💪 Ultimate Training', {
        body: QUOTES[Math.floor(Date.now() / 86400000) % QUOTES.length],
        tag: 'daily-reminder',
        renotify: true
      });
      setTimeout(scheduleNotification, 60000);
    }
  }, delay);
}

window.requestNotifications = async function() {
  if (!('Notification' in window)) {
    alert('Je browser ondersteunt geen meldingen.');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    scheduleNotification();
    const banner = document.getElementById('notifBanner');
    if (banner) {
      banner.style.background = '#f0fff0';
      banner.style.borderColor = '#2E7D32';
      banner.innerHTML = '<span style="font-size:1.3rem">✅</span><div style="font-family:Barlow,sans-serif;font-size:0.9rem;color:#2E7D32;font-weight:600">Meldingen ingeschakeld! Elke dag om 09:00.</div>';
      setTimeout(() => banner.remove(), 3000);
    }
  } else {
    alert('Meldingen geweigerd. Zet ze aan via je telefooninstellingen.');
  }
};

function addNotifBanner() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') { scheduleNotification(); return; }
  if (Notification.permission === 'denied') return;
  if (localStorage.getItem('ut_notif_dismissed')) return;
  const container = document.querySelector('.container');
  if (!container) return;
  const banner = document.createElement('div');
  banner.id = 'notifBanner';
  banner.style.cssText = 'background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:8px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;';
  banner.innerHTML = `
    <span style="font-size:1.3rem;flex-shrink:0">🔔</span>
    <div style="flex:1">
      <div style="font-family:Barlow Condensed,sans-serif;font-size:0.72rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:2px">Dagelijkse reminder</div>
      <div style="font-size:0.82rem;color:var(--text2)">Ontvang elke dag om 09:00 een gym quote</div>
    </div>
    <button onclick="requestNotifications()" style="background:var(--gold);color:#fff;border:none;border-radius:5px;font-family:Bebas Neue,sans-serif;font-size:0.85rem;letter-spacing:2px;padding:8px 12px;cursor:pointer;flex-shrink:0">Aan</button>
    <button onclick="localStorage.setItem('ut_notif_dismissed','1');this.parentNode.remove()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:0 4px;flex-shrink:0">✕</button>
  `;
  container.insertBefore(banner, container.firstChild);
}


</script>
</body>
</html>
